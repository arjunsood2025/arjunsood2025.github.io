# Site settings
title: "Arjun Sood"
email: "asood74@gatech.edu"
description: >-
  XXXXXXXXX student at Georgia Tech, passionate about AI for robotics and intelligent real-world systems.

minimal_mistakes_skin: default
search: false

# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes
permalink: /:categories/:title/
paginate: 5
paginate_path: /page:num/
timezone: America/New_York

include:
  - _pages

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

# -----------------------------------------------
# SIDEBAR — edit these to update the sidebar info
# -----------------------------------------------
author:
  name   : "Arjun Sood"
  avatar : "/assets/images/profile-photo.jpg"   # Replace with your actual photo filename
  bio    : "XXXXXXXXXXXXXXXXX @ Georgia Tech"
  location: "Philadelphia, PA"                        # Your city/state
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/arjunsood2025"    # Your GitHub URL
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/arjun-sood-0a0a38285/"  # Replace with your LinkedIn
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:asood74@gatech.edu"

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/arjunsood2025"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/YOUR_LINKEDIN_HANDLE"

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
